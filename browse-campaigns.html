<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Discover fundraisers · CareWay</title>
<meta name="description" content="Find a cause that matters to you. Browse verified fundraisers on CareWay by category, status and more.">
<link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body data-page="browse">

<section class="page-intro">
  <div class="wrap">
    <div class="breadcrumb"><a href="index.html">Home</a><svg viewBox="0 0 24 24" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Browse</span></div>
    <h1>Discover fundraisers</h1>
    <p>Find a cause that matters to you.</p>
  </div>
</section>

<section class="section-tight" style="padding-top:0">
  <div class="wrap">
    <!-- toolbar -->
    <div class="browse-toolbar">
      <div class="search-inline">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="search" id="browseSearch" placeholder="Search by name, cause or place…" autocomplete="off">
      </div>
      <button class="filter-btn" id="filterBtn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 7h10M18 7h2M4 12h2M10 12h10M4 17h7M15 17h5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="16" cy="7" r="2" stroke="currentColor" stroke-width="2"/><circle cx="8" cy="12" r="2" stroke="currentColor" stroke-width="2"/><circle cx="13" cy="17" r="2" stroke="currentColor" stroke-width="2"/></svg>
        Filters<span id="filterCount"></span>
      </button>
    </div>

    <div class="active-chips" id="activeChips"></div>
    <div class="results-meta"><span id="resultsMeta"></span></div>

    <div class="card-grid cols-3" id="browseGrid"></div>

    <!-- empty state -->
    <div class="empty-state hide" id="emptyState">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>
      <h3>No campaigns found</h3>
      <p>We couldn't find any fundraisers matching your filters. Try clearing them, or start a campaign of your own.</p>
      <div class="acts">
        <button class="btn btn-soft" id="emptyClear">Clear filters</button>
        <a href="start.html" class="btn btn-primary">Start a campaign</a>
      </div>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>
</section>

<!-- filter sheet -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>
<aside class="filter-sheet" id="filterSheet" role="dialog" aria-modal="true" aria-label="Filters">
  <div class="sheet-head">
    <h3>Filters</h3>
    <button class="icon-btn" id="sheetClose" aria-label="Close filters"><svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
  <div class="sheet-foot">
    <button class="btn btn-ghost" id="sheetClear">Clear all</button>
    <button class="btn btn-primary" id="sheetApply">Apply filters</button>
  </div>
</aside>

<script src="assets/js/data.js"></script>
<script src="assets/js/ui.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
